<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<title>Lazarvision brand guidelines · Lazar LaLone</title>
<style>
  :root { --mono: "SF Mono", ui-monospace, Menlo, monospace; }
  body { margin:0; background:#111; color:#eee;
        font-family:"Helvetica Neue",Helvetica,-apple-system,"Segoe UI",Arial,sans-serif; }
  .wrap { max-width:960px; margin:0 auto; padding:38px 20px 90px; }
  .plab { font-family:var(--mono); font-size:11px; letter-spacing:.14em;
          text-transform:uppercase; color:#999; margin:0 0 6px; }
  h1 { font-size:26px; font-weight:600; margin:0 0 4px; letter-spacing:-.01em; }
  .note { color:#999; font-size:13.5px; margin:0 0 26px; max-width:62ch; }
  .pages { -webkit-user-select:none; -moz-user-select:none; user-select:none;
           -webkit-touch-callout:none; }
  .pg { width:100%; display:block; margin:0 0 14px; -webkit-user-drag:none;
        user-drag:none; pointer-events:none; }
  .taste { color:#999; font-size:13px; margin:2px 0 0; }
  .gate { border-top:1px solid #333; margin-top:34px; padding-top:26px; }
  .gate p { color:#999; font-size:13.5px; max-width:62ch; }
  input { background:#1a1a1a; border:1px solid #333; color:#eee; padding:10px 13px;
          font:inherit; font-size:14px; width:220px; }
  button { background:#eee; color:#111; border:0; padding:10px 20px; font:inherit;
           font-size:14px; font-weight:600; cursor:pointer; }
  .msg { font-family:var(--mono); font-size:12px; color:#c98; min-height:18px; }
  a.back { color:#999; font-size:13px; text-decoration:none; }
</style>
<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "faa52c1304e644d7a972cf62bce222eb"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
<div class="wrap">
  <p class="plab">Brand guidelines</p>
  <h1>Lazarvision.</h1>
  <p class="note">A first look, viewable here. The print-quality PDF is available with an
  access code. If we know each other, just ask me for it.</p>
  <div class="pages" oncontextmenu="return false">
    <img class="pg" src="b/pages/lazarvision-01-wm.jpg" draggable="false" loading="lazy" alt="Lazarvision brand guidelines, page 1">
    <img class="pg" src="b/pages/lazarvision-02-wm.jpg" draggable="false" loading="lazy" alt="Lazarvision brand guidelines, page 2">
    <img class="pg" src="b/pages/lazarvision-03-wm.jpg" draggable="false" loading="lazy" alt="Lazarvision brand guidelines, page 3">
    <img class="pg" src="b/pages/lazarvision-04-wm.jpg" draggable="false" loading="lazy" alt="Lazarvision brand guidelines, page 4">
    <img class="pg" src="b/pages/lazarvision-05-wm.jpg" draggable="false" loading="lazy" alt="Lazarvision brand guidelines, page 5">
  </div>
  <p class="taste">The first five pages. The full set is available on request.</p>
  <div class="gate">
    <p class="plab">The PDF</p>
    <p>Enter the access code to download the full-resolution book.</p>
    <form onsubmit="unlock(event)">
      <input id="code" placeholder="Access code" autocomplete="off">
      <button>Download</button>
    </form>
    <p class="msg" id="msg"></p>
    <p style="margin-top:22px"><a class="back" href="brands.html">&#8592; Back</a></p>
  </div>
</div>
<script>
async function unlock(e) {
  e.preventDefault();
  const code = document.getElementById("code").value.trim();
  if (!code) return;
  const data = new TextEncoder().encode("lazarvision:" + code);
  const buf = await crypto.subtle.digest("SHA-256", data);
  const hex = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
  const url = "b/" + hex.slice(0, 20) + ".pdf";
  const head = await fetch(url, { method: "HEAD" });
  if (head.ok) { location.href = url; document.getElementById("msg").textContent = ""; }
  else { document.getElementById("msg").textContent = "That code did not open it. Ask Lazar for the current one."; }
}
</script>
</body>
</html>
