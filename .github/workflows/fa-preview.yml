name: refresh FA preview

# Screenshots the fractionalaesthetics.com homepage daily at a PHONE viewport and
# rewrites fa-home-preview.webp, so the preview on healthcare.html stays current.
# It is shot at 390x844 because healthcare.html frames it as a phone screen: the
# whole hero, at its own proportions, with no CSS zoom. Changing this viewport
# means changing the aspect-ratio on .fadoor-thumb img to match.
# Commits only when the image actually changed (same pattern as meter.yml).

on:
  schedule:
    - cron: "27 7 * * *"   # daily
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fa-preview
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i playwright@latest
          npx --yes playwright install --with-deps chromium
      - name: Install webp tools
        run: sudo apt-get update && sudo apt-get install -y webp
      - name: Screenshot the homepage
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');
          (async () => {
            const b = await chromium.launch();
            const c = await b.newContext({
              viewport: { width: 390, height: 844 },
              deviceScaleFactor: 3,
              isMobile: true,
              hasTouch: true,
              userAgent: 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1',
            });
            const p = await c.newPage();
            await p.goto('https://www.fractionalaesthetics.com', { waitUntil: 'networkidle', timeout: 60000 });
            await p.waitForTimeout(2000);
            /* the first screen only: the hero, exactly as a phone shows it */
            await p.screenshot({ path: 'fa-home.png', clip: { x: 0, y: 0, width: 390, height: 844 } });
            await b.close();
          })().catch(e => { console.error(e); process.exit(1); });
          EOF
      - name: Compress to webp
        run: cwebp -q 82 -resize 780 0 fa-home.png -o fa-home-preview.webp
      - name: Commit if changed
        run: |
          git config user.name "fa-preview-bot"
          git config user.email "fa-preview-bot@users.noreply.github.com"
          git add fa-home-preview.webp
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "refresh FA homepage preview [skip ci]"
            git push
          fi
